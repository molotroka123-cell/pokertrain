<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IceCrown Advisor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: rgba(5,11,24,0.92);
    color: #e0e0e0;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    border-radius: 14px;
    border: 1.5px solid rgba(74,200,255,0.3);
    overflow: hidden;
    -webkit-app-region: drag;
  }
  .header {
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(74,200,255,0.15);
  }
  .title { font-size: 12px; font-weight: 800; color: #4ac8ff; letter-spacing: 1px; }
  .status { font-size: 9px; color: #22c55e; }
  .content { padding: 10px 12px; }
  .advice {
    font-size: 18px; font-weight: 900; color: #fff;
    margin-bottom: 4px;
  }
  .detail { font-size: 11px; color: #8a9aaa; line-height: 1.5; }
  .ev { font-size: 12px; color: #22c55e; font-weight: 700; margin-top: 6px; }
  .error { color: #ef4444; }
  .scanning { color: #ffa020; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  .btn {
    -webkit-app-region: no-drag;
    padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(74,200,255,0.3);
    background: rgba(74,200,255,0.1); color: #4ac8ff; font-size: 10px;
    font-weight: 700; cursor: pointer; margin-top: 8px;
  }
  .keys { font-size: 9px; color: #3a5a6a; padding: 6px 12px; text-align: center; }
</style>
</head>
<body>
  <div class="header">
    <span class="title">♛ ICECROWN ADVISOR</span>
    <span class="status" id="status">● Ready</span>
  </div>
  <div class="content">
    <div class="advice" id="advice">Press Scan to analyze</div>
    <div class="detail" id="detail">Capture your poker table screen and get instant GTO feedback on every decision.</div>
    <div class="ev" id="ev"></div>
    <button class="btn" id="scanBtn" onclick="startScan()">📸 Scan Table</button>
  </div>
  <div class="keys">Ctrl+Shift+P to toggle · Drag to move</div>

  <script>
    let scanning = false;
    const ANTHROPIC_ENDPOINT = '/api/claude';

    async function startScan() {
      if (scanning) return;
      scanning = true;
      document.getElementById('status').textContent = '● Scanning...';
      document.getElementById('status').className = 'status scanning';
      document.getElementById('advice').textContent = 'Analyzing...';
      document.getElementById('detail').textContent = 'Capturing screen and sending to AI...';
      document.getElementById('ev').textContent = '';

      try {
        const screenshot = await window.electronAPI.captureScreen();
        if (!screenshot) {
          showError('Could not capture screen');
          return;
        }

        const response = await fetch(ANTHROPIC_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 500,
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: { type: 'base64', media_type: 'image/png', data: screenshot.replace('data:image/png;base64,', '') }
                },
                {
                  type: 'text',
                  text: `You are a GTO poker advisor. Analyze this poker table screenshot.
Identify: 1) Hero's cards, 2) Board cards, 3) Pot size, 4) Hero's position, 5) Current action facing hero.
Then give the GTO-correct action (fold/check/call/raise) with sizing if applicable.
Format your response as:
ACTION: [fold/check/call/raise X]
REASON: [1-2 sentence explanation]
EV: [estimated EV of correct play vs hero's likely action]
Keep it extremely concise. If you can't identify the table, say "NO TABLE DETECTED".`
                }
              ]
            }]
          })
        });

        const data = await response.json();
        const text = data.content?.[0]?.text || 'No response';

        if (text.includes('NO TABLE DETECTED')) {
          showError('No poker table detected on screen');
          return;
        }

        const actionMatch = text.match(/ACTION:\s*(.+)/i);
        const reasonMatch = text.match(/REASON:\s*(.+)/i);
        const evMatch = text.match(/EV:\s*(.+)/i);

        document.getElementById('advice').textContent = actionMatch ? actionMatch[1].trim() : text.slice(0, 50);
        document.getElementById('detail').textContent = reasonMatch ? reasonMatch[1].trim() : '';
        document.getElementById('ev').textContent = evMatch ? 'EV: ' + evMatch[1].trim() : '';
        document.getElementById('status').textContent = '● Live';
        document.getElementById('status').className = 'status';
      } catch (err) {
        showError('API error: ' + err.message);
      } finally {
        scanning = false;
      }
    }

    function showError(msg) {
      document.getElementById('advice').textContent = 'Error';
      document.getElementById('detail').textContent = msg;
      document.getElementById('detail').className = 'detail error';
      document.getElementById('status').textContent = '● Error';
      document.getElementById('status').className = 'status error';
      scanning = false;
    }
  </script>
</body>
</html>
