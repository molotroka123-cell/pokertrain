<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d12" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>WSOP Poker Trainer</title>
  <style>
    :root {
      --gold: #d4af37;
      --gold-bright: #ffd700;
      --gold-dim: #8a7520;
      --gold-glow: rgba(212,175,55,0.4);
      --felt: #145a32;
      --felt-light: #1a7a45;
      --navy: #0a0d12;
      --navy-mid: #0d1118;
      --surface: #111820;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0d12;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a2230; border-radius: 2px; }

    /* Range slider */
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; width: 100%; cursor: pointer; }
    input[type=range]::-webkit-slider-runnable-track { height: 6px; border-radius: 3px; background: linear-gradient(90deg, #d4af37 var(--fill,50%), #1a2230 var(--fill,50%)); }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, #ffe066, #d4af37); margin-top: -9px; box-shadow: 0 0 10px rgba(212,175,55,0.6), 0 2px 6px rgba(0,0,0,0.4); border: 2px solid #fff3; }
    input[type=range]::-moz-range-track { height: 6px; background: #1a2230; border-radius: 3px; border: none; }
    input[type=range]::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: #d4af37; border: none; cursor: pointer; box-shadow: 0 0 8px rgba(212,175,55,0.5); }
    input[type=range]::-moz-range-progress { background: #d4af37; height: 6px; border-radius: 3px; }

    /* Button hover/active */
    .btn-action { transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1); cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    .btn-action:hover { filter: brightness(1.2); transform: translateY(-2px); }
    .btn-action:active { transform: scale(0.95) translateY(0); filter: brightness(0.95); }

    .btn-preset { transition: all 0.15s ease; }
    .btn-preset:hover { border-color: #d4af37 !important; color: #d4af37 !important; }

    /* Keyframes */
    @keyframes activeGlow {
      0%, 100% { box-shadow: 0 0 0 3px rgba(212,175,55,0.5), 0 0 20px rgba(212,175,55,0.3); }
      50% { box-shadow: 0 0 0 3px rgba(212,175,55,0.2), 0 0 12px rgba(212,175,55,0.15); }
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
    @keyframes chipSlide {
      0% { opacity:0; transform:translate(-50%,-50%) scale(0.3) translateY(15px); }
      60% { opacity:1; transform:translate(-50%,-50%) scale(1.08); }
      100% { transform:translate(-50%,-50%) scale(1); }
    }
    @keyframes winPopup {
      0% { opacity:0; transform:translateX(-50%) scale(0.4); }
      60% { transform:translateX(-50%) scale(1.06); }
      100% { opacity:1; transform:translateX(-50%) scale(1); }
    }
    @keyframes timerShrink {
      from { width: 100%; }
      to { width: 0%; }
    }
    @keyframes fadeInUp {
      from { opacity:0; transform:translateX(-50%) translateY(12px); }
      to { opacity:1; transform:translateX(-50%) translateY(0); }
    }
    @keyframes raiseSlideIn {
      from { opacity:0; max-height:0; transform:translateY(-6px); }
      to { opacity:1; max-height:200px; transform:translateY(0); }
    }
    @keyframes cardDeal {
      0% { opacity:0; transform:translateY(-50px) rotate(-12deg) scale(0.3); }
      70% { opacity:1; transform:translateY(-2px) rotate(1deg) scale(1.04); }
      100% { transform:translateY(0) rotate(0) scale(1); }
    }
    @keyframes goldPulse {
      0%,100% { box-shadow: 0 0 15px rgba(212,175,55,0.3); }
      50% { box-shadow: 0 0 25px rgba(212,175,55,0.5); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}</script>
</body>
</html>
